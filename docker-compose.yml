version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sevasetu_db
    environment:
      POSTGRES_DB: sevasetu
      POSTGRES_USER: sevasetu
      POSTGRES_PASSWORD: sevasetu_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sevasetu"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sevasetu_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sevasetu_api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://sevasetu:sevasetu_secret@postgres:5432/sevasetu
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change_me_access_secret_at_least_32_chars_long
      JWT_REFRESH_SECRET: change_me_refresh_secret_at_least_32_chars_long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
